<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First Impression 🤠</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script> tailwind.config = { darkMode: 'class', } </script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body x-data="PageManager()" class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-500">
    
    <button id="darkModeBtn" class="fixed top-6 right-6 bg-gray-200 dark:bg-gray-800 text-black dark:text-white px-3 py-2 rounded z-50 transition-colors duration-500">
      🌙
    </button>
    
    <div x-data="HeroData()">

      <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-12 transition-colors duration-500">
        <div class="max-w-4xl mx-auto text-center" data-aos="fade-down">
          <h1 class="text-4xl font-bold">Máté Pejnovac <span x-show="! superSecretMode" x-text="age"></span></h1>
          <p class="text-lg mt-2">Computer Scientist 🌴 IT Specialist</p>
          <div class="flex justify-center gap-6 mt-4 text-2xl">
            <a href="mailto:pejnovac.mate@gmail.com"><i class="fas fa-envelope hover:text-yellow-300 transition-colors"></i></a>
            <a href="https://linkedin.com/in/máté-pejnovac-622684243/" target="_blank"><i class="fab fa-linkedin hover:text-blue-300 transition-colors"></i></a>
            <a href="https://github.com/penmate" target="_blank"><i class="fab fa-github hover:text-gray-300 transition-colors"></i></a>
            <a href="https://gitlab.com/pejnovac.mate" target="_blank"><i class="fab fa-gitlab hover:text-gray-300 transition-colors"></i></a>
          </div>
        </div>
      </header>

      <div class="flex gap-6 p-6" >

        <div class="flex flex-col space-y-6 transition-all duration-500" :class="rightSection ? 'w-[60%] mr-auto' : 'w-[60%] mx-auto'">
          
          <section class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 transition-colors duration-500" data-aos="fade-up">
            <h2 class="text-2xl font-bold mb-3 text-gray-900 dark:text-white transition-colors duration-500">Welcome To My Page 🔥</h2>
            <p x-text="bio" class="text-gray-700 dark:text-gray-300 transition-colors duration-500"></p>
          </section>

          <section class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 transition-colors duration-500" data-aos="fade-up">
            <h2 class="text-2xl font-bold mb-3 text-gray-900 dark:text-white transition-colors duration-500">Experience 🧠</h2>
            
            <div class="relative mt-2">
              <div class="absolute left-[7px] top-2 bottom-2 w-0.5 bg-gray-200 dark:bg-gray-700 transition-colors duration-500"></div>

              <div class="space-y-6 relative">
                <template x-for="exp in experiences" :key="exp.id">
                  <div class="relative pl-8 z-10">
                    
                    <div class="absolute left-0 top-1.5 w-4 h-4 bg-blue-500 rounded-full ring-4 ring-white dark:ring-gray-800 transition-colors duration-500"></div>
                    
                    <h3 x-text="exp.name" class="font-semibold text-gray-900 dark:text-white transition-colors duration-500"></h3>
                    <p class="text-sm text-gray-600 dark:text-gray-400 transition-colors duration-500 mb-1">
                      <span x-text="exp.startYear"></span> – <span x-text="exp.endYear"></span>
                    </p>
                    <p x-text="exp.description" class="text-gray-700 dark:text-gray-300 transition-colors duration-500"></p>
                    
                  </div>
                </template>
              </div>
            </div>
          </section>

          <section class="bg-white dark:bg-gray-800 rounded-xl shadow p-6 transition-colors duration-500" data-aos="zoom-in">
  
            <h2 class="text-2xl font-bold mb-3 text-gray-900 dark:text-white transition-all duration-500">Projects 🚀</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <template x-for="proj in projects" :key="proj.id">
                
                <div class="p-4 border border-gray-200 dark:border-gray-700 rounded-lg hover:shadow-lg transition-all duration-500">
                  
                  <h3 x-text="proj.name" class="font-semibold text-gray-900 dark:text-white transition-all duration-500"></h3>
                  
                  <p x-show="proj.visible" x-text="proj.description" class="text-gray-700 dark:text-gray-300 transition-all duration-500 mt-1 mb-3"></p>
                  
                  <button type="button" @click="activeProjectId = activeProjectId === proj.id ? null : proj.id" x-text="activeProjectId != proj.id ? 'Show' : 'Hide'" class="text-blue-700 hover:text-white border border-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 dark:border-blue-500 dark:text-blue-500 dark:hover:text-white dark:hover:bg-blue-500 dark:focus:ring-blue-800 transition-all duration-500"></button>
                  <a href="#" x-text="'View Project'" x-show="proj.visible" class="text-green-700 hover:text-white border border-green-700 hover:bg-green-800 focus:ring-4 focus:outline-none focus:ring-green-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center me-2 mb-2 dark:border-green-500 dark:text-green-500 dark:hover:text-white dark:hover:bg-green-600 dark:focus:ring-green-800 transition-all duration-500"></a>

                </div>         
              </template>
            </div>
          </section>

          <section class="relative bg-white dark:bg-gray-800 rounded-xl p-6 shadow overflow-hidden transition-colors duration-500" data-aos="fade-up">
            
            <div 
              x-show="lives <= 0"
              x-transition
              class="absolute inset-0 bg-black bg-opacity-70 flex items-center justify-center rounded-xl z-10">
              <h2 class="text-4xl font-extrabold text-white animate-pulse">Game Over!</h2>
            </div>

            <h2 class="flex items-center justify-between text-2xl font-bold mb-3 text-gray-900 dark:text-white transition-colors duration-500">
              <span>My Daily Dose Of Challenge For You 😎</span>
              <span class="flex gap-1">
                <template x-for="i in lives">
                  <img src="https://i.postimg.cc/dtcJdgqp/hearth.png" alt="!" class="w-6 h-6" />
                </template>
              </span>
            </h2>

            <template x-for="challenge in challenges">
  
              <div class="p-4 m-4 border border-gray-200 dark:border-gray-700 rounded-lg hover:shadow-lg transition-all duration-500 relative">
                
                <h2 x-text="challenge.name" class="font-semibold text-gray-900 dark:text-white transition-all duration-500"></h2>
                <p x-text="challenge.description" class="text-gray-700 dark:text-gray-300 transition-all duration-500 mb-2"></p>
                
                <template x-if="challenge.id == 1">
                  <div class="flex flex-wrap gap-3 mt-2 items-center">

                    <input 
                      type="text" 
                      x-ref="answerInput" 
                      class="border border-indigo-200 dark:border-gray-600 rounded px-2 py-1 focus:outline-none transition-all duration-500 bg-indigo-50 text-indigo-700 dark:bg-gray-700 dark:text-indigo-200"
                      :class="{
                        'border-green-500 ring-2 ring-green-300 dark:ring-green-800': challenge.completed === true,
                        'border-red-500 ring-2 ring-red-300 dark:ring-red-800': challenge.completed === false && challenge.textInput !== age
                      }"
                    />

                    <button 
                      @click="
                        challenge.textInput = $refs.answerInput.value;
                        if (challenge.textInput == age) {
                          challenge.completed = true;
                        } else {
                          challenge.completed = false;
                          lives--;
                        }
                      " 
                      class="px-4 py-1 bg-indigo-500 dark:bg-indigo-600 text-white rounded-lg hover:bg-indigo-600 dark:hover:bg-indigo-700 transition-all duration-500"
                    >
                      Check Answer
                    </button>

                    <template x-if="challenge.completed === true">
                      <span class="ml-2 text-lg font-bold text-green-600 dark:text-green-400 animate-bounce">
                        🎉 Correct! Level Up! 🚀
                      </span>
                    </template>

                    <template x-if="challenge.completed === false && challenge.textInput !== age">
                      <span class="ml-2 text-lg font-bold text-red-600 dark:text-red-400 animate-pulse">
                        ❌ Wrong answer! Try again! 💡
                      </span>
                    </template>

                  </div>
                </template>

                <template x-if="challenge.id == 2">
                  <div class="flex flex-wrap gap-3 mt-2">
                    <template x-for="(skill, idx) in skills" :key="idx">
                      <button
                        type="button"
                        class="px-3 py-1 rounded-full border flex items-center gap-2 select-none transition-all duration-300 bg-indigo-50 text-indigo-700 dark:bg-gray-700 dark:text-indigo-200 dark:border-gray-600 hover:scale-105"
                        :class="{
                          '!bg-green-100 !text-green-700 border-green-400 ring-2 ring-green-200 dark:!bg-green-900 dark:!text-green-200 dark:ring-green-800': skill.state === 'correct',
                          '!bg-red-100 !text-red-700 border-red-400 ring-2 ring-red-200 dark:!bg-red-900 dark:!text-red-200 dark:ring-red-800': skill.state === 'wrong',
                          'opacity-50 cursor-not-allowed hover:scale-100': skill.disabled === true
                        }"
                        :disabled="skill.disabled"
                        @click="checkSkill(skill, challenge)"
                      >
                        <span x-text="skill.name"></span>

                        <span x-show="skill.state === 'correct'" class="text-green-600 dark:text-green-400">✅</span>
                        <span x-show="skill.state === 'wrong'" class="text-red-600 dark:text-red-400">❌</span>
                      </button>
                    </template>
                    <template x-if="challenge.completed === true">
                      <span class="ml-2 text-lg font-bold text-green-600 dark:text-green-400 animate-bounce w-full block mt-2">
                        🎉 Correct! Level Up! 🚀
                      </span>
                    </template>
                  </div>
                </template>

              </div>          
            </template>   

          </section>
        </div>
      
        <section 
          x-show="activeProjectId !== null"
          x-transition.duration.200ms
          class="sticky top-[25vh] w-[40%] h-[40vh] border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 rounded-xl shadow flex flex-col self-start overflow-hidden transition-colors duration-500"
        >
          <div class="flex p-4 border-b dark:border-gray-700 justify-between items-center bg-gray-50 dark:bg-gray-900 px-4 py-3 transition-colors duration-500">
            <h3 class="font-semibold text-gray-900 dark:text-white transition-colors duration-500" x-text="projects.find(p => p.id === activeProjectId)?.name">
              Projekt neve
            </h3>
            <button 
              @click="activeProjectId = null"
              class="text-gray-500 hover:text-red-500 dark:text-gray-400 dark:hover:text-red-400 font-bold text-lg transition-colors"
            >
              ❌
            </button>
          </div>

          <div class="p-6 overflow-y-auto">
            <p x-text="projects.find(p => p.id === activeProjectId)?.description" class="text-gray-700 dark:text-gray-300 transition-colors duration-500">
              Itt jelenik meg a magyarázat szövege...
            </p>
          </div>
        </section>
      </div>

    </div>

    <footer class="bg-gray-800 dark:bg-gray-950 text-white text-center py-6 mt-6 transition-colors duration-500" data-aos="fade-up">
      <p>© <span x-text="currentYear"></span> Máté Pejnovac – All rights reserved</p>
    </footer>

    <button id="scrollTopBtn" class="fixed bottom-6 right-6 bg-indigo-600 text-white p-3 rounded-full shadow-lg hidden hover:bg-indigo-700 transition-colors">
      ↑
    </button>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 1000, once: true });

      // Scroll To Top
      const scrollTopBtn = document.getElementById("scrollTopBtn");
      window.addEventListener("scroll", () => {
        if (window.scrollY > 300) {
          scrollTopBtn.classList.remove("hidden");
        } else {
          scrollTopBtn.classList.add("hidden");
        }
      });
      scrollTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      function PageManager() {
        return {
          currentYear: new Date().getFullYear(),
          rightSection: false,
          lives: 3,
          activeProjectId: null,
          challenges: [
            {
              id: 1,
              name: 'Can You Hack My Page? ',
              description: 'You can find out my age by hacking my client side code. But the question is, can You exploit my superSecret stuff? 😏',
              active: true,
              completed: undefined,
              textInput: ''
            },
            {
              id: 2,
              name: 'Guess Game',
              description: 'Which tools do you think I used to create the page? Choose your guesses. 🧐',
              active: true,
              completed: undefined
            }
          ],
          skills: [
            { id: '1', name: 'Python', correct: false, disabled: false, state: null },
            { id: '2', name: 'JavaScript', correct: true, disabled: false, state: null },
            { id: '3', name: "SQL", correct: false, disabled: false, state: null },
            { id: '4', name: 'ChatGPT', correct: true, disabled: false, state: null },
            { id: '5', name: 'Alpine.js', correct: true, disabled: false, state: null },
            { id: '6', name: 'React', correct: false, disabled: false, state: null }            
          ],

          checkSkill(skill, challenge) {
            if (skill.disabled) return;

            if (skill.correct) {
              skill.state = 'correct';
            } else {
              skill.state = 'wrong';
              this.lives = (this.lives || 0) - 1;
            }

            skill.disabled = true;

            const allCorrectFound = this.skills
              .filter(s => s.correct)
              .every(s => s.state === 'correct');

            if (allCorrectFound) {
              challenge.completed = true;
              this.skills.forEach(s => s.disabled = true);
            }

            if (!skill.correct) {
              setTimeout(() => {
                skill.state = null;
              }, 2000);
            }
          }
        }
      };

      function HeroData() {
        return {
          name: 'Máté Pejnovac',
          age: new Date().getFullYear() - 1999 - (new Date() < new Date(new Date().getFullYear(), 4, 23)), 
          superSecretMode: true,
          location: "Hungary",
          bio: "Motivated IT professional with experience in software development and infrastructure. Passionate about learning and building impactful projects.",
          projects: [
            {
              id: "1",
              name: "Agro Website 🐐",
              active: true,
              visible: false,
              description: "Full-stack web application using Angular and Spring Boot for agricultural trading of harvested products and farming equipment.",
              link: "",
              date: "2023.05.15. 10:00" 
            },
            {
              id: "2",
              name: "Numerology App 🌠",
              active: true,
              visible: false,
              description: "Standalone Python application that generates detailed numerology reports based on a client's name and date of birth.",
              link: "",
              date: "2020.12.03. 13:39"
            }
          ],
          experiences: [
            {
              id: "1",
              name: "Web Developer & Configurator – Gemma Rendszerház",
              active: true,
              description: "Working on a web-based management system using VBScript and complex SQL queries, and contributing to its redevelopment focusing on front-end development with Alpine.js and JavaScript.",
              link: "",
              startYear: "2024",
              endYear: "Present"
            },
            {
              id: "2",
              name: "Web Developer Intern – Rackhost",
              active: false,
              description: "Developed a web-based prototype bug-tracking application using the Yii2 framework during my internship.",
              link: "",
              startYear: "2022",
              endYear: "2023"
            },
            {
              id: "3",
              name: "CTO / Lead Developer – Adventures Guide Startup",
              active: false,
              description: "Led the technical direction of an online city travel guide startup, selecting technologies like Angular and Firebase, and delivering a functional prototype in an agile team.",
              link: "",
              startYear: "2022",
              endYear: "2023"
            },
            {
              id: "4",
              name: "Business Owner – GamingFoxTech",
              active: true,
              description: "Founded and managed a business specializing in servicing, repairing, testing, and refurbishing used laptops for online resale.",
              link: "",
              startYear: "2020",
              endYear: "Present"
            }
          ]
        }
      };

      // Dark Mode
      const darkBtn = document.getElementById("darkModeBtn");
      const html = document.documentElement; // Ezt módosítottuk body-ról html-re!

      // Oldal betöltésekor ellenőrizzük a mentett beállítást
      if (localStorage.getItem("theme") === "dark") {
        html.classList.add("dark");
        darkBtn.textContent = "☀️";
      }

      // Gombnyomás esemény
      darkBtn.addEventListener("click", () => {
        html.classList.toggle("dark");
        
        if (html.classList.contains("dark")) {
          localStorage.setItem("theme", "dark");
          darkBtn.textContent = "☀️";
        } else {
          localStorage.setItem("theme", "light");
          darkBtn.textContent = "🌙";
        }
      });
    </script>
</body>
</html>
